<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Interactive Stats App</title>
    <!-- Import Streamlit CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.1/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Import stlite JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.1/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          // 1. Specify the Python packages we need
          requirements: ["numpy", "matplotlib"],
          
          // 2. Point to the main file
          entrypoint: "app.py",
          
          // 3. Write our Python code as a string
          files: {
            "app.py": `
import streamlit as st
import numpy as np
import matplotlib.pyplot as plt

st.title("Interactive Statistical Teaching App")
st.write("Welcome! This is our first app running entirely in the browser via WebAssembly.")

st.sidebar.header("Simulation Settings")
sample_size = st.sidebar.slider("Select Sample Size (n):", min_value=10, max_value=1000, value=100, step=10)

data = np.random.normal(loc=0.0, scale=1.0, size=sample_size)

st.subheader("Sample Statistics")
col1, col2 = st.columns(2)
col1.metric("Sample Mean", f"{np.mean(data):.3f}")
col2.metric("Sample Std Dev", f"{np.std(data):.3f}")

st.subheader("Data Distribution Histogram")
fig, ax = plt.subplots()
ax.hist(data, bins=20, edgecolor="black", color="skyblue")
ax.set_title(f"Histogram of Normal Distribution (n = {sample_size})")
ax.set_xlabel("Value")
ax.set_ylabel("Frequency")

st.pyplot(fig)
            `,
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
